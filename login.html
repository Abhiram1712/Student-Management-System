<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        async function login(){
            event.preventDefault();

            const username=document.getElementById("username").value;
            const password=document.getElementById("password").value;
            if(!(/^[a-zA-Z0-9]{8,}$/.test(username))){
                alert("Invalid Username");
                return;
            }
            if(!(/^[a-zA-Z0-9]{8,}$/.test(password))){
                alert("Invalid Password");
                return;
            }

            // const user = JSON.parse(localStorage.getItem(`${username}`));
            
            const res=await fetch("http://localhost:3000/users").then(response=>response.json());

            if(res.some((ele)=>ele.username==username && ele.password==password)){
                window.location.href="dashboard.html";
            }



            // if(user=== null || user=== undefined){
            //     alert("Invalid Credentials");
            //     return;
            // }

            // if(user.password!==password){
            //     alert("Invalid Password");
            //     return;
            // }

            // window.location.href="dashboard.html";
        }
    </script>
</head>
<body>
    <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
    </nav>

    <h1>Login to Your Account</h1>
    
    <form onsubmit="login()" action="dashboard.html">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Login">
    </form>
    
    <p class="alc">Don't have an account?<a href="register.html" class="already">Register here</a></p>

    
</body>
</html>
