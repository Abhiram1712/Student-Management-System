<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        async function register(){
            event.preventDefault();

            const username=document.getElementById("username").value;
            const email=document.getElementById("email").value;
            const password=document.getElementById("password").value;
            const cpassword=document.getElementById("cpassword").value;

            if(username.length<8){
                alert("Username must be of 8 characters")
                return;
            }
            if(!(/^[a-zA-Z0-9]{8,}$/.test(username))){
                alert("Username must not contain special characters");
                return;
            }
            
            if(password!==cpassword){
                alert("Password and Confirm Password does not match");
                return;
            }

            if(!(/^[a-zA-Z0-9]{6,}$/.test(password))){
                alert("Password is too weak , Go with a Strong password");
                return;
            }


            // const std=localStorage.getItem(username);
            // console.log(std);
            // if(std!==null){
            //     alert("Username Already Taken");
            //     return;
            // }

            // const x=JSON.parse(localStorage.getItem("Mails")) || [];
            // for(let c of x){
            //     if(c==email){
            //         alert('Email is already associated with an account');
            //         return;
            //     }
            // }

            const std= await fetch("http://localhost:3000/users").then(response=>response.json());
            console.log(std);
            if(std.some((ele)=>ele.username==username || ele.email==email)){
                alert("Username or Email already taken");
                return;
            }

            const user = {
                username:username,
                email:email,
                password:password,
                cpassword:cpassword
            }

           
            // x.push(email);
            // localStorage.setItem("Mails",JSON.stringify(x));

            // localStorage.setItem(`${username}`,JSON.stringify(user));

            const res=fetch("http://localhost:3000/users",{method:"POST",body:JSON.stringify(user)});
            if(res){
                alert("Registration Success");
            }
            else{
                alert("Registration Failed");
                return;
            }

            window.location.href="login.html";
        }
    </script>
</head>
<body>
    <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
    </nav>

    <h1>Create a New Account</h1>
    <form onsubmit="register()" action="login.html">

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="cpassword">Confirm Password:</label>
        <input type="password" id="cpassword" name="cpassword" required><br><br>

        <input type="submit" value="Register">

    </form>

    <p class="alc">Already an User? <a href="login.html" class="already">Login here</a></p>
    
</body>
</html>
