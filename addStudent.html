<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Page</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        async function addStudent(){
            event.preventDefault();
            const name=document.getElementById("name").value;
            const rollno=document.getElementById("rollno").value;
            const branch=document.getElementById("branch").value;
            const cgpa=document.getElementById("cgpa").value;

            const data={
                name:name,
                rollno:rollno,
                branch:branch,
                cgpa:cgpa
            }

            // let std=JSON.parse(localStorage.getItem("Students")) || [];

            // std.push(data);

            // localStorage.setItem("Students",JSON.stringify(std));

            const res=await fetch("http://localhost:3000/students",{method:"POST",body:JSON.stringify(data)});
            if(!res){
                alert("An Error Occured! Try Again");
                return;
            }

            window.location.href="viewStudent.html";

        }
    </script>
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addStudent.html">Add Student</a>
        <a href="viewStudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div>
        <h1>Fill the Details to add Student</h1>
        <form onsubmit="addStudent()" action="viewStudent.html">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="rollno">Roll No:</label>
            <input type="number" id="rollno" name="rollno" required><br><br>

            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" required><br><br>

            <label for="cgpa">CGPA:</label>
            <input type="text" id="cgpa" name="cgpa" required><br><br>

            <input type="submit" value="Add Student">
        </form>
    </div>
    
</body>
</html>
