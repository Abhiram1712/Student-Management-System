<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Page</title>
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addStudent.html">Add Student</a>
        <a href="viewStudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div>
        <h1>Fill the Details to add Student</h1>
        <form action="viewStudent.html">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="rollno">Roll No:</label>
            <input type="number" id="rollno" name="rollno" required><br><br>

            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" required><br><br>

            <label for="cgpa">CGPA:</label>
            <input type="text" id="cgpa" name="cgpa" required><br><br>

            <input type="submit" value="Add Student">
        </form>
    </div>
    
</body>
</html>
