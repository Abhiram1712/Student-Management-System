<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students Page</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
            document.addEventListener("DOMContentLoaded", async () => {
                let data = document.querySelector("tbody");
                // let std = (JSON.parse(localStorage.getItem("Students")) || []);
                let std = await fetch("http://localhost:3000/students").then(response=>response.json());
                // console.log(std);

                for (const k of std) {
                    data.innerHTML += `<tr>
                    <td>${k.name}</td>
                    <td>${k.rollno}</td>
                    <td>${k.branch}</td>
                    <td>${k.cgpa}</td>
                    <td><input type="button" onclick="window.location.href='editStudent.html?rollno=${k.rollno}'" value="Edit"></td>
                    <td><input type="button" onclick="deleteR('${k.name}')" value="Delete"></td>
                </tr>`;
                }
            });

        async function deleteR(ssm) {
            // let std = JSON.parse(localStorage.getItem("Students")) || [];

            let std= await fetch("http://localhost:3000/students").then(response=>response.json());

            let index=-1;
            for(let a in std){
                if(std[a]['name']==ssm){
                    index=std[a]['id'];
                    break;
                }
            }

            if (index !== -1) {
                // std.splice(index, 1);

                // localStorage.setItem("Students", JSON.stringify(std));

                // location.reload();
                const res= await fetch(`http://localhost:3000/students/${index}`,{method:"DELETE"});
                console.log(res);
            } else {
                console.log("Student not found");
            }
        }
    </script>

</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addStudent.html">Add Student</a>
        <a href="viewStudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div>
        <h1>Student Details:</h1>
        <table border="solid 1px">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Branch</th>
                    <th>CGPA</th>
                    <th colspan="2">Action</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

</body>

</html>
