<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addStudent.html">Add Student</a>
        <a href="viewStudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div>
        <h1>Edit Student Details</h1>
        <form action="viewStudent.html">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="Akhil" required><br><br>

            <label for="rollno">Roll No:</label>
            <input type="number" id="rollno" name="rollno" value="102" required><br><br>

            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" value="ECE" required><br><br>

            <label for="cgpa">CGPA:</label>
            <input type="text" id="cgpa" name="cgpa" value="9.2" required><br><br>

            <input type="submit" value="Update Student">
        </form>
    
</body>
</html>
