<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Details</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        document.addEventListener("DOMContentLoaded",async ()=>{
            
            const p=new URLSearchParams(window.location.search);
            const rno=p.get("rollno");
            // std=(JSON.parse(localStorage.getItem("Students")) || []);
            std=await fetch("http://localhost:3000/students").then(response=>response.json());

            id=-1;
            k=-1
            for(const t in  std){
                if(std[t]['rollno']===rno){
                    id=std[t]['id'];
                    k=t;
                    break;
                }
            }
            document.getElementById("name").value=std[k]['name'];
            document.getElementById("rollno").value=std[k]['rollno'];
            document.getElementById("branch").value=std[k]['branch'];
            document.getElementById("cgpa").value=std[k]['cgpa'];
        });
        async function edit(){
            event.preventDefault();
            const name=document.getElementById("name").value;
            const rollno=document.getElementById("rollno").value;
            const branch=document.getElementById("branch").value;
            const cgpa=document.getElementById("cgpa").value;
            const r={
                name:name,
                rollno:rollno,
                branch:branch,
                cgpa:cgpa
            }

            // std.splice(k,1,r)
            // localStorage.setItem("Students",JSON.stringify(std));

            const res = await fetch(`http://localhost:3000/students/${id}`,{method:"PUT",body:JSON.stringify(r)});
            // console.log(res);
            
        //    window.location.href="viewStudent.html"
        }

    </script>
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addStudent.html">Add Student</a>
        <a href="viewStudent.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div>
        <h1>Edit Student Details</h1>
        <form onsubmit="edit()" action="viewStudent.html">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="rollno">Roll No:</label>
            <input type="number" id="rollno" name="rollno" required><br><br>

            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" required><br><br>

            <label for="cgpa">CGPA:</label>
            <input type="text" id="cgpa" name="cgpa" required><br><br>

            <input type="submit" value="Update Student">
        </form>
    
</body>
</html>
